services:
  db:
    image: postgres:16-alpine
    container_name: instagram_mvp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-instagram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-instagram}
      POSTGRES_DB: ${POSTGRES_DB:-instagram_mvp}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-instagram}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
